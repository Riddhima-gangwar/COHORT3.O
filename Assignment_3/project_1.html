<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Art Work</title>
    <link rel="stylesheet" href="project_1.css">
</head>
<body>
    <main class="gallery-page">
        <span class="dot d1"></span>
        <span class="dot d2"></span>
        <span class="dot d3"></span>
        <span class="dot d4"></span>
        <span class="dot d5"></span>
        <span class="dot d6"></span>

        <header>
            <h1>Explore Art Work</h1>
            <a href="#">See All</a>
        </header>

        <section class="grid">
            <article class="card">
                <div class="art monocular">
                    <img src="https://images.unsplash.com/photo-1645625705504-4b7a3808c1f9?auto=format&fit=crop&w=420&q=80" alt="Monocular artwork">
                    <span class="ring"></span>
                    <span class="eye"></span>
                </div>
                <div class="info">
                    <h2>Monocular</h2>
                    <p>54.8k</p>
                    <span class="heart"></span>
                </div>
                <button>Place Bid</button>
            </article>

            <article class="card">
                <div class="art horns">
                    <img src="https://images.unsplash.com/photo-1699414149180-3fafc7bfe901?auto=format&fit=crop&w=420&q=80" alt="Horns mask artwork">
                    <span class="horn left"></span>
                    <span class="horn right"></span>
                    <span class="mask"></span>
                </div>
                <div class="info">
                    <h2>Horns Mask</h2>
                    <p>32.4k</p>
                    <span class="heart"></span>
                </div>
                <button>Place Bid</button>
            </article>

            <article class="card">
                <div class="art moon">
                    <img src="https://images.unsplash.com/photo-1757942250400-4796418e92e9?auto=format&fit=crop&w=420&q=80" alt="Light moon artwork">
                    <span class="helmet"></span>
                    <span class="beam"></span>
                </div>
                <div class="info">
                    <h2>Light Moon</h2>
                    <p>86.6k</p>
                    <span class="heart"></span>
                </div>
                <button>Place Bid</button>
            </article>

            <article class="card">
                <div class="art wire">
                    <img src="https://images.unsplash.com/photo-1611255518888-30feae5f15b4?auto=format&fit=crop&w=420&q=80" alt="Skull wire artwork">
                    <span class="hair"></span>
                    <span class="skull"></span>
                </div>
                <div class="info">
                    <h2>Skull Wire</h2>
                    <p>78.9k</p>
                    <span class="heart"></span>
                </div>
                <button>Place Bid</button>
            </article>

            <article class="card">
                <div class="art spiderman">
                    <img src="https://images.unsplash.com/photo-1602006462828-4fdc44c553df?auto=format&fit=crop&w=420&q=80" alt="Spiderman artwork">
                    <span class="hood"></span>
                    <span class="face"></span>
                </div>
                <div class="info">
                    <h2>Spiderman</h2>
                    <p>24.8k</p>
                    <span class="heart"></span>
                </div>
                <button>Place Bid</button>
            </article>

            <article class="card">
                <div class="art deadpool">
                    <img src="https://images.unsplash.com/photo-1501432377862-3d0432b87a14?auto=format&fit=crop&w=420&q=80" alt="DeadPool artwork">
                    <span class="chain"></span>
                    <span class="face"></span>
                </div>
                <div class="info">
                    <h2>DeadPool</h2>
                    <p>59.7k</p>
                    <span class="heart"></span>
                </div>
                <button>Place Bid</button>
            </article>

            <article class="card">
                <div class="art white-eye">
                    <img src="https://images.unsplash.com/photo-1723171800178-7b038a9be2ab?auto=format&fit=crop&w=420&q=80" alt="White eye skull artwork">
                    <span class="skull"></span>
                </div>
                <div class="info">
                    <h2>White Eye</h2>
                    <p>45.7k</p>
                    <span class="heart"></span>
                </div>
                <button>Place Bid</button>
            </article>

            <article class="card">
                <div class="art spinal">
                    <img src="https://images.unsplash.com/photo-1763198302535-265c44183bcb?auto=format&fit=crop&w=420&q=80" alt="Plastic spinal artwork">
                    <span class="head"></span>
                    <span class="bone"></span>
                </div>
                <div class="info">
                    <h2>Plastic Spinal</h2>
                    <p>98.6k</p>
                    <span class="heart"></span>
                </div>
                <button>Place Bid</button>
            </article>
        </section>
    </main>
</body>
</html>
