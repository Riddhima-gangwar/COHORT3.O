<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect Collection</title>
    <link rel="stylesheet" href="project_3.css">
</head>
<body>
    <main class="page">
        <section class="left">
            <header class="topbar">
                <h2>INSECT</h2>
                <div class="search">
                    <span></span>
                    <p>Search...</p>
                </div>
            </header>

            <h1 class="side-title">Classification</h1>

            <div class="classification">
                <div class="item">
                    <span></span>
                    <div>
                        <b>Class:</b>
                        <p>Insecta</p>
                    </div>
                </div>
                <div class="item">
                    <span></span>
                    <div>
                        <b>Order:</b>
                        <p>Coleoptera</p>
                    </div>
                </div>
                <div class="item">
                    <span></span>
                    <div>
                        <b>Family:</b>
                        <p>Cerambycidae</p>
                    </div>
                </div>
                <div class="item">
                    <span></span>
                    <div>
                        <b>Sub-Family:</b>
                        <p>Cerambycinae</p>
                    </div>
                </div>
                <div class="item">
                    <span></span>
                    <div>
                        <b>Tribe:</b>
                        <p>Callichromatini</p>
                    </div>
                </div>
                <div class="item">
                    <span></span>
                    <div>
                        <b>Genus:</b>
                        <p>Pachyteria</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="right">
            <nav>
                <a href="#">Home</a>
                <a href="#">Shop</a>
                <a href="#">About</a>
                <a href="#">Gallery</a>
                <a href="#">Contact</a>
            </nav>

            <div class="details">
                <h1>Pachyteria<br>equestris</h1>

                <div class="meta">
                    <div class="bug-icon">
                        <div class="icon-head"></div>
                        <div class="icon-body"></div>
                        <div class="icon-line left-line"></div>
                        <div class="icon-line right-line"></div>
                        <p>32 mm</p>
                    </div>
                    <div class="divider"></div>
                    <div class="facts">
                        <p><b>⌖ Locality:</b><br>Malaysia</p>
                        <p><b>♂ Sex:</b><br>Male</p>
                        <p><b>▱ Size:</b><br>32 mm / 12 mm</p>
                    </div>
                </div>

                <h2>$5.99</h2>

                <label><span class="switch"></span>View detailed antennae</label>
                <label><span class="switch"></span>View underside</label>

                <button>Add to collection</button>
            </div>
        </section>

        <div class="display">
            <div class="glass"></div>
            <div class="beetle">
                <span class="antenna a1"></span>
                <span class="antenna a2"></span>
                <span class="leg l1"></span>
                <span class="leg l2"></span>
                <span class="leg l3"></span>
                <span class="leg l4"></span>
                <span class="leg l5"></span>
                <span class="leg l6"></span>
                <div class="head"></div>
                <div class="thorax"></div>
                <div class="wing left-wing"></div>
                <div class="wing right-wing"></div>
            </div>
            <div class="base"></div>
        </div>
    </main>
</body>
</html>
